<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Apner Hotels.com | Billig-reiser.no</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    :root {
      color-scheme: dark;
      --bg: #040b15;
      --panel: #0b1727;
      --line: rgba(255, 255, 255, .14);
      --text: #f7fbff;
      --muted: #a9b7c7;
      --cyan: #28d9ff;
      --pink: #ff4bd8;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 22% 16%, rgba(40, 217, 255, .18), transparent 34%),
        radial-gradient(circle at 80% 78%, rgba(255, 75, 216, .14), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 520px);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      background: rgba(11, 23, 39, .92);
      box-shadow: 0 22px 70px rgba(0, 0, 0, .42);
    }

    img {
      width: 74px;
      height: 74px;
      border-radius: 8px;
      display: block;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    a,
    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
    }

    a {
      color: #03111b;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
    }

    button {
      color: var(--text);
      background: rgba(255, 255, 255, .09);
      border: 1px solid var(--line);
    }

    .status {
      margin-top: 14px;
      min-height: 20px;
      color: #d8f8ff;
      font-size: .95rem;
    }
  </style>
</head>
<body>
  <main>
    <img src="/favicon-192x192.png" alt="">
    <h1>Apner Hotels.com</h1>
    <p>Vi sender deg videre via nettleseren, slik at hotell-lenken fungerer bedre pa mobil.</p>
    <div class="actions">
      <a id="continueLink" href="/" rel="nofollow sponsored noopener">Fortsett</a>
      <button id="copyButton" type="button">Kopier lenke</button>
    </div>
    <p class="status" id="status" aria-live="polite">Videresender...</p>
  </main>
  <script>
    (() => {
      const continueLink = document.getElementById("continueLink");
      const copyButton = document.getElementById("copyButton");
      const status = document.getElementById("status");
      const params = new URLSearchParams(window.location.hash.slice(1) || window.location.search.slice(1));
      const rawTarget = params.get("to") || params.get("url") || "";

      function decodeTarget(value) {
        try {
          return decodeURIComponent(value);
        } catch (error) {
          return value;
        }
      }

      function isAllowed(url) {
        return /(^|\.)hotels\.com$/i.test(url.hostname) ||
          /(^|\.)(tkqlhce|anrdoezrs|jdoqocy|kqzyfj|dpbolvw)\.com$/i.test(url.hostname);
      }

      function readTarget() {
        const decoded = decodeTarget(rawTarget);
        try {
          const url = new URL(decoded);
          if (!/^https:$/i.test(url.protocol) || !isAllowed(url)) return "";
          return url.toString();
        } catch (error) {
          return "";
        }
      }

      const target = readTarget();
      if (!target) {
        continueLink.href = "/";
        status.textContent = "Lenken mangler eller er ugyldig.";
        return;
      }

      continueLink.href = target;
      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(target);
          status.textContent = "Lenken er kopiert.";
        } catch (error) {
          status.textContent = "Kunne ikke kopiere automatisk.";
        }
      });

      window.setTimeout(() => {
        window.location.replace(target);
      }, 850);
    })();
  </script>
</body>
</html>
